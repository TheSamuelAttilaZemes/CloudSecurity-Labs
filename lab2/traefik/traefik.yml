# /traefik/traefik.yml
api:
  dashboard: true

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ':8443'

providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true
